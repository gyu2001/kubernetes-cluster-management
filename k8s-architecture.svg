<svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- Control Plane -->
  <rect x="220" y="20" width="200" height="56" rx="6" fill="#E8E8E8" stroke="#333333" stroke-width="2"/>
  <text x="320" y="44" font-size="15" fill="#222222" text-anchor="middle">Control Plane</text>
  <text x="320" y="64" font-size="12" fill="#555555" text-anchor="middle">(master)</text>

  <!-- lines to workers -->
  <line x1="270" y1="76" x2="150" y2="150" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="76" x2="490" y2="150" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Worker 1 -->
  <rect x="60" y="152" width="180" height="50" rx="6" fill="#F7F7F7" stroke="#333333" stroke-width="2"/>
  <text x="150" y="182" font-size="15" fill="#222222" text-anchor="middle">Worker Node 1</text>

  <!-- Worker 2 -->
  <rect x="400" y="152" width="180" height="50" rx="6" fill="#F7F7F7" stroke="#333333" stroke-width="2"/>
  <text x="490" y="182" font-size="15" fill="#222222" text-anchor="middle">Worker Node 2</text>

  <!-- Worker1 -> Pods -->
  <line x1="150" y1="202" x2="150" y2="234" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="70" y="236" width="160" height="42" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="150" y="262" font-size="13" fill="#333333" text-anchor="middle">Pods</text>

  <!-- Worker2 -> Pods -->
  <line x1="490" y1="202" x2="490" y2="234" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="410" y="236" width="160" height="42" rx="6" fill="#FFFFFF" stroke="#333333" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="490" y="262" font-size="13" fill="#333333" text-anchor="middle">Pods</text>

  <!-- Networking components row -->
  <rect x="150" y="300" width="340" height="46" rx="6" fill="#F0F0F0" stroke="#333333" stroke-width="2"/>
  <text x="320" y="328" font-size="14" fill="#222222" text-anchor="middle">ETCD · Calico · CoreDNS</text>
</svg>
